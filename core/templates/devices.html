{% extends 'base.html' %}

{% block content %}

<h2>Devices da Sala</h2>

{% for device in devices %}
<div class="card">
    <h4>{{ device.nome }}</h4>

    {% if device.carregando %}
        <p class="status-ok">Carregando</p>
    {% else %}
        <p class="status-erro">Não carregando</p>
    {% endif %}
</div>
{% endfor %}

{% endblock %}
